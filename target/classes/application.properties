spring.application.name=AlerteServer
server.port=8080

spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/api_database}
spring.datasource.username=${DB_USERNAME:devuser}
spring.datasource.password=${DB_PASSWORD:default_dev_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.security.user.name=${SECURITY_USER:user}
spring.security.user.password=${SECURITY_PASSWORD:default_password}

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://accounts.google.com
spring.security.oauth2.resourceserver.jwt.audiences=${GOOGLE_CLIENT_ID:your_google_client_id.apps.googleusercontent.com}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

alerte.niveaux.actifs=1,2,3,4
alerte.types.actifs=1,2,3,4,5,6,7,8,9
alerte.mail.cron=0 0 8 * * *
alerte.update.cron=0 0 6 * * *