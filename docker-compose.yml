version: '3.8'

services:
  alerteserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: alerteserver:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/alertedb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - alerte-network
    restart: always

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=alertedb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - alerte-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alertedb"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  alerte-network:

volumes:
  postgres_data:
